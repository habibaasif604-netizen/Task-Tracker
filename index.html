<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla JS Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="header-row">
            <h1>Task Tracker</h1>
            <button id="theme-toggle" class="theme-btn" aria-label="Toggle dark/light mode">🌙</button>
        </div>
        
        <form id="task-form">
            <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off" required>
            <button type="submit" id="add-btn">Add Task</button>
        </form>

        <ul id="task-list">
            </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
